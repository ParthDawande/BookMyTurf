spring.config.import=optional:classpath:application-local.properties

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=SNAKE_CASE

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyturfdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=86400000

# ── Razorpay (placeholder — replace with real keys when available) ────────────
app.razorpay.key-id=rzp_test_placeholder
app.razorpay.key-secret=placeholder_secret

# ── Business config (DECISIONS.md — not secrets, fixed for v1) ────────────────
app.platform.commission-rate=0.10
app.booking.cancellation-window-hours=24
app.booking.reschedule-window-hours=24
app.payout.hold-hours=24
